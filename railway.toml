# Railway deployment configuration
#
# Each Railway service must set these in the UI (Settings → Build):
#
#   forge-api:
#     Dockerfile Path: Dockerfile.api
#     (root directory: /)
#
#   forge-worker:
#     Dockerfile Path: Dockerfile.worker
#     (root directory: /)
#
#   forge-auth:
#     Dockerfile Path: Dockerfile       (lives inside auth/)
#     Root Directory:   /auth            ← REQUIRED so COPY finds package.json
#
#   forge-dashboard:
#     Dockerfile Path: Dockerfile       (lives inside dashboard/)
#     Root Directory:   /dashboard       ← REQUIRED so COPY finds package.json
#

[build]
builder = "DOCKERFILE"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
