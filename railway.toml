# Railway deployment configuration
# Each service overrides these defaults in the Railway UI:
#   forge-api:       Dockerfile.api,       PORT=8000
#   forge-worker:    Dockerfile.worker     (no port — background service)
#   forge-auth:      auth/Dockerfile,      PORT=3100
#   forge-dashboard: dashboard/Dockerfile, PORT=80

[build]
builder = "DOCKERFILE"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
