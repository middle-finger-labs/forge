<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ subject }}</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0a0a0a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #e0e0e0;
      -webkit-font-smoothing: antialiased;
    }
    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 48px 24px;
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-mark {
      display: inline-block;
      width: 48px;
      height: 48px;
      background: #6366f1;
      border-radius: 12px;
      line-height: 48px;
      text-align: center;
      font-size: 24px;
      font-weight: 700;
      color: #ffffff;
    }
    .card {
      background: #141414;
      border: 1px solid #262626;
      border-radius: 12px;
      padding: 32px;
    }
    h1 {
      font-size: 20px;
      font-weight: 600;
      color: #f5f5f5;
      margin: 0 0 12px 0;
    }
    p {
      font-size: 14px;
      line-height: 1.6;
      color: #a0a0a0;
      margin: 0 0 24px 0;
    }
    .cta {
      display: block;
      text-align: center;
      background: #6366f1;
      color: #ffffff !important;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      padding: 14px 24px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    .fallback {
      font-size: 12px;
      color: #666;
      text-align: center;
      word-break: break-all;
    }
    .fallback a {
      color: #6366f1;
      text-decoration: none;
    }
    .divider {
      border: none;
      border-top: 1px solid #262626;
      margin: 24px 0;
    }
    .footer {
      text-align: center;
      font-size: 12px;
      color: #555;
      margin-top: 32px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="logo-mark">F</div>
    </div>
    <div class="card">
      <h1>{{ heading }}</h1>
      <p>{{ body_text }}</p>
      <a href="{{ deep_link }}" class="cta">{{ cta_text }}</a>
      <div class="fallback">
        Or copy this link:<br>
        <a href="{{ web_link }}">{{ web_link }}</a>
      </div>
      <hr class="divider">
      <p style="font-size: 12px; color: #555; margin-bottom: 0;">
        This link expires in 15 minutes. If you didn't request this, you can safely ignore this email.
      </p>
    </div>
    <div class="footer">
      Forge &mdash; AI-powered software delivery
    </div>
  </div>
</body>
</html>
